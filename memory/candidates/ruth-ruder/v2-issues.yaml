# ============================================================================
# ISSUES
# ============================================================================

issues:

  # --------------------------------------------------------------------------
  # ISSUE 1: Superintendent oversight / board–administration scope
  # AE: AE-1 (handbook 6-1 Jul 2025), AE-4 (admin contracts 5-1-1 Jan 2024),
  #     AE-13 admin-contract subset (Feb 2026 3-3 + 4-2). AE-14 = stated.
  # --------------------------------------------------------------------------
  - id: i-superintendent-oversight
    title: "Board oversight of the superintendent and administrators"
    stated:
      text: |
        During her 2023 campaign, Ruth Ruder said she would not micromanage
        the administration. In her October 2023 candidate Q&A she wrote: "I
        would not micromanage. I will review policy and ensure that it is
        being abided by and changed if need be. Communication is key." She
        added that she would like "to improve the relationship between the
        board and the administration in working on policies and procedures
        together as a team." From the dais in July 2025, during the Hays High
        School student-handbook discussion, she repeated the same boundary
        in her own words: "The board hires the superintendent, and it is up
        to the superintendent to manage his staff and the principals to
        manage their schools, not the board. I do not want to be involved
        in every disciplinary action that any kid has at Hays High School."
      sourceIds:
        - s-hayspost-ruder-qa-oct2023
        - s-hayspost-discipline-handbook-jul2025
    actions:
      - id: a-handbook-vote-2025
        date: "2025-07-21"
        body: |
          Voted yes on a 6-1 motion approving the 2025-26 Hays High School
          student handbook, which contained the discipline-policy framework
          presented by Principal Shawn Henderson. Allen Park cast the lone
          no vote. During the discussion preceding the vote, Ruder said
          "Every scenario is going to be different," that until she had
          reason to do otherwise she was "on the administration's side,"
          and that handling disciplinary matters was "[Henderson's] job to
          handle discipline, not ours."
        sourceIds:
          - s-hayspost-discipline-handbook-jul2025
          - s-usd489-boarddocs
      - id: a-admin-contracts-2024
        date: "2024-01-22"
        body: |
          Voted yes on a 5-1-1 motion approving one-year contract extensions
          for four district administrators — Superintendent Ron Wilson,
          Assistant Superintendent / Director of Curriculum Shanna Dinkel,
          Assistant Superintendent of Business Services Chris Hipp, and
          Director of Special Education Kyle Carlin — by blanket motion.
          Allen Park voted no. Derek Yarmer abstained. Park had moved to
          evaluate each administrator's contract individually before the
          final vote; that motion failed. Park had also moved to enter
          executive session on the superintendent's contract; that motion
          also failed.
        sourceIds:
          - s-hayspost-admin-contracts-jan2024
          - s-citizenjournal-board-takeaways
          - s-usd489-boarddocs
      - id: a-admin-contracts-feb2026
        date: "2026-02-24"
        body: |
          At the February 24, 2026 meeting, the board considered two motions
          on district administrator and director contracts. Ruder voted no
          on a 3-3 motion (which failed) to push the contract decision to
          March 9, 2026. She also voted no on a 4-2 motion (which passed)
          to extend the administrator contracts to March 9. On the same
          night, she voted yes on a 3-2 motion (which failed) to approve
          HVAC service agreement amendments with Glassman Corp for Roosevelt
          Elementary and Hays Middle School (Park and Yarmer no; Goetz
          abstained because her husband works for Glassman; Vajnar absent),
          and yes on the subsequent unanimous motion to instead solicit
          districtwide preventive-maintenance RFPs.
        sourceIds:
          - s-hayspost-hvac-contracts-feb2026
          - s-hayspost-felten-construction-feb2026
          - s-usd489-boarddocs
    socialSignals: []
    # No gap declared. See narrative-writer-notes at bottom for full reasoning.

  # --------------------------------------------------------------------------
  # ISSUE 2: Board civility, communication, and the Vice-President role
  # AE: AE-2 (asbestos/no-vote exchange Sept 2025). AE-14 = stated.
  # --------------------------------------------------------------------------
  - id: i-board-civility
    title: "Communication and civility among board members"
    stated:
      text: |
        Ruth Ruder ran in 2023 on a communication-and-civility theme. From
        her October 2023 candidate Q&A: "I would change the current
        communication. Working and communicating together in a civil and
        organized manner is how I believe we can accomplish our mission
        moving forward." And: "I feel like there is not enough communication
        and respect on the current school board." She added: "Even in
        disagreements, we must be civil and compromise to make the best
        decisions for our students."
      sourceIds:
        - s-hayspost-ruder-qa-oct2023
    actions:
      - id: a-civility-exchange-2025
        date: "2025-09-22"
        body: |
          At a regular board meeting where a $69,480 contract with ACM
          Removal LLC for asbestos abatement at the new Hays Middle School
          building and a separate $88,347 change order for the new Hays
          High School both passed with Allen Park as the lone dissenting
          vote, Ruder publicly addressed Park's vote pattern from the dais.
          Her statements on the floor: "What would have happened if we had
          all voted no? Would we be in trouble from the health and human
          services department for not removing asbestos that is known?";
          "Are you just voting no to [satisfy] the public, because you're
          not spending money?"; and "Every week we come here and we get
          these no votes on things that should not be voted no on just to
          [satisfy] the taxpayer to say, 'I didn't vote no on it.' You have
          a right to vote the way you want, but I am sick and tired of
          coming here every week and there's a no vote on something. That
          isn't right for the public." Park replied: "I'm not voting that
          we shouldn't do it. I'm voting this process to do this. I'm No.
          1 on safety." Ken Brooks asked Park what he would have changed
          had he had the change orders in advance.
        sourceIds:
          - s-hayspost-asbestos-sept2025
          - s-hayspost-asbestos-preview-sept2025
          - s-usd489-boarddocs
    socialSignals: []
    # No gap declared. The September 2025 exchange is observable behavior; a
    # reader can place it next to her 2023 communication-and-civility theme
    # and draw their own conclusion. Asserting a gap would require triangulated
    # evidence that her stated position was "be civil to colleagues" — but her
    # 2023 quote pairs civility with "we must be civil AND compromise to make
    # the best decisions," and a reasonable reading is that the floor exchange
    # is itself an attempt at compromise-through-public-deliberation. Not
    # symmetry-passable as a gap. Record both; let the reader judge.

  # --------------------------------------------------------------------------
  # ISSUE 3: Bond projects, facilities, and asbestos remediation
  # AE: AE-3 (bond PM 3-4 fail Mar 2025), AE-5 flooring subset (Dec 2025),
  #     AE-10 (O'Loughlin $14.49M MGP 5-2 tabling Sept 2024),
  #     AE-11 (HHS change orders 5-1 Dec 2024),
  #     AE-12 (athletic-facility multi-vote Feb 2025),
  #     AE-13 Felten subset (Feb 2026). AE-14 = stated.
  # --------------------------------------------------------------------------
  - id: i-bond-facilities
    title: "Bond projects, facility construction, and asbestos remediation"
    stated:
      text: |
        In her October 2023 candidate Q&A, Ruth Ruder said: "I think the
        board should have a vital role in the bond moving forward, ensuring
        that communication is key." She also said she would "do my best at
        representing the taxpayer in being fiscally responsible in the
        district but also identifying smart growth." In her July 2023
        candidate profile, she said her "first obligation, if elected, will
        be to the children in our district by providing them through the
        staff, the resources necessary to allow them to obtain quality
        educational opportunities."
      sourceIds:
        - s-hayspost-ruder-qa-oct2023
        - s-hayspost-ruder-profile-jul2023
    actions:
      - id: a-oloughlin-mgp-2024
        date: "2024-09-09"
        body: |
          Voted yes on a 5-2 motion to table approval of a $14.49 million
          maximum guaranteed price for O'Loughlin Elementary School
          renovations until the next board meeting. Ken Brooks and Meagan
          Zampieri-Lillpopp voted no. Ruder was joined in the yes-to-table
          majority by Derek Yarmer, Curt Vajnar, Jayme Goetz, and Allen
          Park. From the floor, Ruder asked: "Could the sale of Lincoln
          Elementary School and Rockwell Administration Center be used to
          pay for bond projects?"
        sourceIds:
          - s-hayspost-oloughlin-mgp-sept2024
          - s-usd489-boarddocs
      - id: a-hhs-change-orders-2024
        date: "2024-12-19"
        body: |
          Voted yes on a 5-1 special-meeting motion approving change orders
          for the new Hays High School construction project. Allen Park
          cast the lone no vote; Derek Yarmer was absent. During the
          discussion Ruder said she thought it was unfair to insinuate
          that Nabholz or DLR were trying to cheat the district.
        sourceIds:
          - s-hayspost-hhs-changes-dec2024
          - s-usd489-boarddocs
      - id: a-athletic-facilities-feb2025
        date: "2025-02-19"
        body: |
          Voted yes across a sequence of athletic-facility capital purchases
          at a single meeting: a $66,364 digital marquee from Golden Rule
          Signs (6-1, Yarmer no), $146,710 in weight-room equipment from
          BSN Sports (7-0 unanimous), $777,680 in video scoreboards (5-2,
          Park and Yarmer no), $687,937 for tennis courts from Stallbaumer
          Construction (6-1, Yarmer no), and $57,714 for wrestling mats
          from Resilite (5-2, Park and Yarmer no). During the tennis-court
          discussion Ruder said: "Do you know how much revenue that brings
          to the city? Do you know how much revenue that one tournament
          brings to our city?"
        sourceIds:
          - s-tigermedia-feb2025-expenditures
          - s-usd489-boarddocs
      - id: a-bond-project-manager-2025
        date: "2025-03-24"
        body: |
          Voted no on a 3-4 motion (which failed) by Derek Yarmer to
          investigate hiring an additional project manager for the
          remainder of the $143.5 million bond program. Yarmer, Allen Park,
          and Curt Vajnar voted yes; Ruder, Jayme Goetz, and two other
          members voted no. From the floor Ruder said: "We should have
          looked at this beforehand, not when we are almost done with the
          bond." Park said in the same discussion: "We have half of the
          bond left. I agree we are way late. It doesn't hurt. Let's see
          what we can do."
        sourceIds:
          - s-hayspost-bond-pm-mar2025
          - s-usd489-boarddocs
      - id: a-felten-flooring-dec2025
        date: "2025-12-15"
        body: |
          Voted yes on a 4-2 motion to replace flooring and abate asbestos
          at the former middle school. Park and Yarmer voted no. The board
          also accepted an Integrated Solutions bid of $110,315 for the
          asbestos abatement. From the floor Ruder said any future flooring
          work could disrupt students and teachers, and that the cost of
          the work will only increase in the future.
        sourceIds:
          - s-hayspost-felten-tile-dec2025
          - s-hayspost-felten-dec-agenda
          - s-usd489-boarddocs
      - id: a-felten-construction-feb2026
        date: "2026-02-24"
        body: |
          Voted yes on a motion approving a $5.7 million maximum-guaranteed-
          price contract with Nabholz Construction for renovations at
          Felten Elementary School. Allen Park and Derek Yarmer voted no.
          From the floor Ruder said she "was confused as to why other
          board members wanted to delay, since they knew, since the bond
          issue was approved, what the scope of work and cost of
          renovations would be for the new elementary school."
        sourceIds:
          - s-hayspost-felten-construction-feb2026
          - s-usd489-boarddocs
    socialSignals: []
    # No gap declared. Ruder's documented bond-related votes are not
    # uniformly administration-aligned: she voted with Allen Park and the
    # majority to table the largest bond MGP (O'Loughlin $14.49M) against
    # Ken Brooks. Her stated position ("vital role in the bond... fiscally
    # responsible... smart growth") and her actions read as consistent
    # within the available record.

  # --------------------------------------------------------------------------
  # ISSUE 4: District land use and property decisions
  # AE: AE-5 land-sale subset (Dec 2025), AE-6 (Mar 2026 rejection),
  #     AE-7 (Apr 2026 reconsideration).
  # --------------------------------------------------------------------------
  - id: i-district-land-use
    title: "District land sales and property decisions"
    stated:
      text: |
        In her October 2023 candidate Q&A, Ruth Ruder framed her fiscal
        approach as: "I will do my best at representing the taxpayer in
        being fiscally responsible in the district but also identifying
        smart growth." She also said: "I believe USD 489 can be the
        highlight of our community, and with the development and growth...
        Hays will be seen as one of the best districts in the state of
        Kansas." Her on-the-record statements during the Felten land
        discussion in December 2025 through April 2026 articulated her
        own working framework: when discussing a possible sale, she
        urged the board to require buyers to specify the property's
        intended use in their bid proposals.
      sourceIds:
        - s-hayspost-ruder-qa-oct2023
        - s-hayspost-felten-tax-deduction-dec2025
    actions:
      - id: a-felten-bid-process-dec2025
        date: "2025-12-15"
        body: |
          Voted yes on a 5-1 motion authorizing the district to solicit
          bids on 7.3 acres of district-owned land north of Felten
          Elementary School (the former Hays Middle School football-field
          area). Allen Park voted no. Meagan Zampieri-Lillpopp was absent.
          In the discussion Ruder expressed concern that someone might
          purchase the land for a tax deduction while leaving it vacant,
          and urged the board to require bidders to specify the property's
          intended use in their proposals.
        sourceIds:
          - s-hayspost-felten-bid-process-dec2025
          - s-hayspost-felten-tax-deduction-dec2025
          - s-usd489-boarddocs
      - id: a-felten-rejection-mar2026
        date: "2026-03-10"
        body: |
          At a board meeting reviewing the four bids received for the
          7.23 acres north of Felten Elementary — all of which came in
          between $200,000 and $250,000, well below the property's
          $630,000 appraisal — the board rejected all four bids. From
          the floor Ruder said: "We're not saying no. We want to see
          what the future holds." The board followed up with a work
          session on March 23, 2026 to hear from the four bidders on
          their proposed projects.
        sourceIds:
          - s-hayspost-felten-rejection-mar2026
          - s-hayspost-felten-worksession-mar2026
          - s-hayspost-felten-reconsider-mar2026
          - s-usd489-boarddocs
      - id: a-felten-reconsideration-apr2026
        date: "2026-04-07"
        body: |
          At a continued discussion on the Felten land sale, the board
          heard developer presentations including from Matt Allen of PWC.
          No formal motion was recorded; the board agreed to continue
          discussing the property. In coverage of this and the prior
          March meeting, Ruder is quoted reflecting on the financial
          math of the bids: "It just doesn't pencil out. If you were
          able to get that kind of money for that lot, you would end up
          with $80,000 to $90,000 per lot before you start construction."
          She also said in the March reconsideration coverage: "If we
          sit on the land, we get nothing," and "I don't think we can
          just say no."
        sourceIds:
          - s-tigermedia-felten-housing-apr2026
          - s-hayspost-housing-plans-apr2026
          - s-hayspost-felten-reconsider-mar2026
          - s-usd489-boarddocs
    socialSignals: []
    # No gap declared. Across December 2025 through April 2026, Ruder's
    # statements form a sequence on the same transaction (Felten land):
    # initial caution about speculative buyers; later, after below-appraisal
    # bids, "we want to see what the future holds" and the "doesn't pencil
    # out" math observation. Read in sequence, this is a single coherent
    # posture — be cautious about the buyer's intent but don't refuse to
    # engage — not a contradiction. Sleuth-pass R-4 explicitly flagged
    # this for narrative-writer to "not characterize as a flip."

  # --------------------------------------------------------------------------
  # ISSUE 5: Curriculum, parental rights, and operational decisions
  # AE: AE-8 (Apr 2026 bathroom-closure/vandalism remarks). AE-14 = stated.
  # --------------------------------------------------------------------------
  - id: i-curriculum-parental-rights
    title: "Curriculum, parental rights, and operational decisions"
    stated:
      text: |
        In her October 2023 candidate forum, asked about the then-planned
        bathroom design at the new Hays High School, Ruth Ruder said:
        "The children voiced to me that nobody asks us. They are very
        excited with the way it's planned now to have a choice between
        the way it is now and a separate bathroom for privacy." She also
        said at the same forum that the board should "review board
        policies" and "ask advice from the board attorney when
        appropriate and have additional work sessions."
      sourceIds:
        - s-hayspost-forum-oct2023
        - s-hayspost-ruder-qa-oct2023
    actions:
      - id: a-bathroom-vandalism-apr2026
        date: "2026-04-20"
        body: |
          At a board discussion (no formal motion or vote) of the group
          bathroom closures at the new Hays High School — closures that
          began in August 2025 following vandalism of sinks and sensors
          and continued after further vandalism that included flush-valve
          sensors removed by unidentified persons — Ruder said: "I would
          like to use the bathroom where I want to use the bathroom when
          I need to use the bathroom." She added: "I agreed with the
          group bathrooms remaining closed." On the broader question of
          vandalism she said: "We are acting like vandalism isn't new.
          It's been going on since the beginning of time. ... It boils
          down to how you parent your children." She also said: "If we
          would talk on test scores instead of restrooms all of the time,
          what a wonderful world it would be." Ken Brooks, in the same
          discussion, said: "We've had this discussion many times in the
          past... and you keep saying the same things, over and over and
          over..." Curt Vajnar said the public had been told during
          construction that students would have a choice between
          individual and group bathrooms. The exact date of the meeting
          is ambiguous between April 20 (a Monday and the regular meeting
          date) and April 21 (a Tuesday); the contemporaneous article
          refers to "Monday night" and the BoardDocs record would resolve.
        sourceIds:
          - s-hayspost-bathroom-vandalism-apr2026
          - s-citizenjournal-bathroom-vandalism-apr2026
          - s-usd489-boarddocs
    socialSignals: []
    # No gap declared. The April 2026 statements are on the operational
    # decision to keep the group bathrooms closed after vandalism, not on
    # the original bathroom design decision — which was already being
    # implemented at the time of her 2023 forum quote. Sleuth-pass R-5
    # explicitly flagged the distinction; this narrative respects it.

  # --------------------------------------------------------------------------
  # ISSUE 6: Sponsorship and commercial-revenue policy
  # AE: AE-9 (Aug-Sept 2025 Golden Belt Bank naming-rights, CORRECTED:
  #     no accept-the-deal vote ever occurred; 3-3 procedural failed).
  # AE-12 athletic-revenue framing referenced (secondary mapping to issue).
  # --------------------------------------------------------------------------
  - id: i-sponsorship-commercial-revenue
    title: "Naming rights and commercial-revenue policy"
    stated:
      text: |
        Ruth Ruder did not address commercial sponsorships or naming
        rights in her 2023 candidate forum or Q&A. Her on-the-record
        statements during the August–October 2025 Golden Belt Bank
        naming-rights discussion form the available articulation of her
        position. She framed the bank's $200,000 offer at the August 4,
        2025 board retreat as "funds in our pocket. It's free funds. To
        me, that's positivity for the community," and "We just won the
        lottery, and you guys don't want to capitalize on it." At the
        same retreat she also said: "It belongs to the town and the
        school, not to some business," and "You can only sell your soul
        so many times."
      sourceIds:
        - s-hayspost-naming-pause-aug2025
        - s-hayspost-naming-postpone-sept2025
    actions:
      - id: a-naming-rights-procedural-aug2025
        date: "2025-08-04"
        body: |
          At an August 4, 2025 board retreat, Ken Brooks made a motion
          to add a vote on accepting Golden Belt Bank's $200,000
          naming-rights offer for the Hays High School football field
          to the agenda of the upcoming Monday regular meeting. The
          procedural motion failed 3-3, for lack of a fourth yes vote;
          Derek Yarmer was absent. Ruder voted yes on the motion to add
          the item to the agenda, along with Brooks and Meagan
          Zampieri-Lillpopp. Board President Curt Vajnar subsequently
          removed the naming-rights item from the September 8, 2025
          regular meeting agenda, rescheduling discussion to an October
          27 work session. Golden Belt Bank's offer expiration deadline
          was September 15, 2025; no formal board vote on accepting
          the offer was held before that date, and the offer effectively
          expired. The board later created a committee to draft a
          naming-rights policy.
        sourceIds:
          - s-hayspost-naming-pause-aug2025
          - s-hayspost-naming-postpone-sept2025
          - s-hayspost-naming-agenda-sept2025
          - s-hayspost-capital-outlay-oct2025
          - s-hayspost-sponsorship-oct2025
          - s-usd489-boarddocs
    socialSignals: []
    # No gap declared. Ruder did not have a pre-existing stated position
    # on commercial naming rights to test against her vote behavior. Her
    # August 4 retreat statements ("free funds," "belongs to the town,"
    # "sell your soul," "won the lottery") are the available articulation
    # and they are visibly in tension within a single conversation — that
    # tension is recorded as her own observable behavior in the action
    # body, not asserted as a gap. The athletic-facility-revenue framing
    # she offered in February 2025 ("Do you know how much revenue that
    # one tournament brings to our city?", a-athletic-facilities-feb2025
    # in i-bond-facilities) is the closest cross-issue link; one possible
    # reading is "public-asset-as-community-revenue-source" as a coherent
    # posture across both votes, but the sleuth flagged this as
    # interpretive and the narrative leaves the inference to readers.

