# ============================================================================
# Narrative-writer notes (for site-profile-writer at Stage 2.d)
# ============================================================================

narrative_writer_notes:

  title_arc:
    note: |
      The contemporaneous record on Ruder's title is ambiguous and time-shifted.
      Verified facts: she has been a board member continuously since January
      2024 (elected November 2023, four-year term through approximately
      January 2028). She was identified as "Board Vice President" in the
      February 24, 2026 Hays Post article on the Felten construction
      contract, suggesting she held the VP role in early 2026 after a
      reorganization. By April 22, 2026 she was identified as "Board Member"
      again, and the current Highbond portal shows Vajnar as President and
      Ken Brooks as Vice-President with Ruder as Member. The candidate
      metadata uses "USD 489 Board of Education member" as the present-tense
      neutral title, with "served as Vice President during early 2026" as
      the historical addendum. Site-profile-writer should NOT assert a
      current Vice President title without verifying against the live
      USD 489 board-of-education page at publish time.

  ae_13_admin_contract_reversal_gap_decision:
    decision: OMIT
    full_reasoning: |
      The directive flagged the AE-4 (January 22, 2024) versus AE-13
      (February 24, 2026) admin-contract vote pair as a potential gap
      candidate against her "I would not micromanage" stated position. I
      examined both votes carefully before deciding.

      AE-4 was a 5-1-1 vote in January 2024 on one-year contract extensions
      for four named district administrators: Superintendent Ron Wilson,
      Assistant Superintendent / Director of Curriculum Shanna Dinkel,
      Assistant Superintendent of Business Services Chris Hipp, and Director
      of Special Education Kyle Carlin. Allen Park voted no, having moved
      first that each contract be evaluated individually. Derek Yarmer
      abstained. Ruder voted yes on the blanket extension.

      AE-13 was actually two related February 2026 motions: (a) a 3-3 motion
      to push the administrator-contract decision to March 9, 2026 (which
      failed for lack of a fourth yes), and (b) a 4-2 motion to extend
      administrator contracts to March 9 (which passed). Ruder voted no on
      both. She voted no on the delay-the-decision motion and no on the
      pass-a-short-extension motion.

      These two events are NOT the same motion. AE-4 was a one-year blanket
      extension of fully-evaluated administrator contracts at the start of
      the calendar year, consistent with the board's typical annual contract
      cycle. AE-13 was a very different procedural question: a short
      extension (to March 9, two weeks out) of administrator contracts amid
      a contested reorganization, with three members (Park, Goetz, Yarmer)
      forming the yes majority that passed the short extension over Ruder's
      and Brooks's objection. The contexts, the administrators involved
      (possibly different by 2026), the duration (12 months vs. 2 weeks),
      and the parliamentary posture (proactive annual cycle vs. reactive
      procedural buy-time motion) all differ.

      Ruder's stated position from her 2023 Q&A is "I would not micromanage.
      I will review policy and ensure that it is being abided by." Neither
      vote directly contradicts that stated position when read carefully:
      the 2024 yes vote was on a board-recommended annual extension (the
      board reviewing and approving as a body, not micromanaging individual
      decisions); the 2026 no vote was a procedural objection to a
      short-extension parliamentary motion she viewed as the wrong process,
      not a substantive position on whether administrators should keep
      their contracts.

      To assert a gap on this issue, IDENTITY.md requires triangulated
      evidence that the stated position is contradicted by both votes.
      I cannot honestly make that assertion. The two votes are on
      materially different motions in materially different parliamentary
      contexts.

      Decision: OMIT the gap. Per IDENTITY.md and the directive's halt
      conditions, do not fabricate.

      What IS recorded: both votes appear as separate actions on the same
      i-superintendent-oversight issue. A reader who sees both can form
      their own view. That is the correct narrative-writer behavior here.

  ae_9_naming_rights_correction:
    note: |
      Per directive critical-correction item 2: the AE-9 Golden Belt Bank
      $200,000 naming-rights deal NEVER received a formal accept-the-deal
      board vote. The only board vote that occurred was a 3-3 procedural
      motion at the August 4, 2025 retreat to add the acceptance question
      to the upcoming Monday regular-meeting agenda. That procedural motion
      failed for lack of a fourth yes vote (Yarmer absent). Ruder voted
      yes on the procedural motion along with Brooks and Zampieri-Lillpopp.
      Vajnar subsequently removed the item from the September 8 agenda.
      The bank's offer expiration was September 15, with no acceptance
      vote held before that date. This narrative reflects the correction:
      the action body for a-naming-rights-procedural-aug2025 frames the
      vote as procedural-to-add-to-agenda, not as a vote to accept the
      deal. Her "free funds," "won the lottery," "belongs to the town,"
      and "sell your soul" remarks all attach to the August 4 retreat
      context and are quoted in stated/action body where they fall.

  ae_3_bond_pm_correction:
    note: |
      Per directive critical-correction item 1: AE-3 (March 24, 2025 bond
      project manager motion) was 3-4 FAILED, not 5-2 as some earlier
