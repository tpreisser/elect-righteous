issues:
  - id: i-water-r9
    title: "Water security and the R9 Ranch project"
    stated:
      text: |
        Ruder's most consistent public issue is Hays' long-term water supply.
        He has described the R9 Ranch project as an everyday governing priority
        and later as a multi-generational battle. The City of Hays also
        publishes R9 Ranch and R9 Property materials as official project pages,
        so the issue is not merely campaign rhetoric; it is a city policy lane
        where Ruder has spoken and acted in office.
      sourceIds:
        - s-haysusa-r9-ranch
        - s-haysusa-r9-property
        - s-hayspost-r9-2023
        - s-hayspost-r9-2025
    actions:
      - id: a-hb2433-house-testimony-2026-01-28
        date: "2026-01-28"
        body: |
          Appeared as a proponent witness on HB 2433 before the Kansas House
          Local Government Committee. His testimony argued that Edwards County
          zoning restrictions on water transfers above 500 acre-feet created a
          second regulatory process for Hays and Russell in the R9 dispute.
        sourceIds:
          - s-ksleg-hb2433
          - s-ksleg-hb2433-testimony
          - s-ksleg-house-ruder-testimony
          - s-kansas-reflector-hb2433
      - id: a-hb2433-senate-testimony-2026-02-26
        date: "2026-02-26"
        body: |
          Returned as a proponent witness for HB 2433 before the Senate Local
          Government, Transparency and Ethics Committee. Two separate Ruder
          testimony files are registered on the official Senate committee page
          for that hearing date.
        sourceIds:
          - s-ksleg-hb2433-testimony
          - s-ksleg-senate-ruder-testimony-1
          - s-ksleg-senate-ruder-testimony-2
      - id: a-r9-public-framing-2023-2025
        date: "2025-08-29"
        body: |
          Repeatedly framed R9 as a long-run city responsibility, including
          the 2023 statement that every day had become an R9 Ranch day and the
          2025 statement that Hays was in a multi-generational battle that
          began decades ago.
        sourceIds:
          - s-haysusa-r9-ranch
          - s-hayspost-r9-2023
          - s-hayspost-r9-2025
    socialSignals: []

  - id: i-housing-development-incentives
    title: "Housing, workforce growth, and development incentives"
    stated:
      text: |
        Ruder's growth language is practical rather than ideological. Public
        coverage ties him to workforce housing, developer incentives, and
        city-return calculations. He has said Hays has opened every possible
        incentive for homebuilding while still facing slow project timelines,
        and he has publicly framed city incentive packages in terms of housing,
        workforce, and measurable local return.
      sourceIds:
        - s-hayspost-housing-incentives
        - s-hayspost-travel-plaza
        - s-tigermedia-pioneer-run
    actions:
      - id: a-pioneer-run-irb-2026-04-23
        date: "2026-04-23"
        body: |
          As mayor, presided over and joined a unanimous 5-0 approval of an
          Industrial Revenue Bond resolution for Overland Property Group's
          48-unit Pioneer Run affordable-housing project. The IRB provides a
          construction sales-tax exemption reported at $147,962.50 and bonus
          points for the developer's state tax-credit application. Ruder said
          the properties look great, are run well, and provide an affordable
          place to live.
        sourceIds:
          - s-haysusa-agenda-04232026
          - s-tigermedia-pioneer-run
      - id: a-travel-plaza-incentives-2026-02-19
        date: "2026-02-19"
        body: |
          Publicly supported moving the I-70 24/7 Travel Plaza TIF and CID
          package toward hearing and action. He cited an estimated city rate
          of return of almost 2,200 percent and described the incentive package
          as a good investment. The package included a pay-as-you-go TIF and a
          CID sales-tax overlay for a 9,000-square-foot travel plaza.
        sourceIds:
          - s-haysusa-agenda-02192026
          - s-haysusa-minutes-02192026
          - s-haysusa-agenda-02262026
          - s-hayspost-travel-plaza
      - id: a-chickfila-irb-2026-03-26
        date: "2026-03-26"
        body: |
          Participated as mayor in the unanimous approval of a resolution of
          intent to issue Industrial Revenue Bonds for a new $6.2 million
          Chick-fil-A project at 3404 Vine. The reported construction
          sales-tax exemption was estimated at $66,875.
        sourceIds:
          - s-haysusa-agenda-03262026
          - s-haysusa-minutes-03262026
          - s-hayspost-chickfila
      - id: a-workforce-housing-incentives-2025
        date: "2025-05-01"
        body: |
          In workforce-housing coverage, said Hays had opened every possible
          incentive for homebuilding but project timelines still remained
          slow. This action is a public governing statement rather than a vote,
          and it is included to show how he frames the incentive pipeline.
        sourceIds:
          - s-hayspost-housing-incentives
    socialSignals: []

  - id: i-budget-taxes-infrastructure
    title: "City budget, taxes, and infrastructure tradeoffs"
    stated:
      text: |
        Ruder's visible budget record is tied to city services, infrastructure,
        and growth tradeoffs. The corrected record matters here: the 1.96-mill
        2026 increase was an Ellis County budget action, not a Hays city vote
        by Mason Ruder. The Hays city 2026 budget was reported as
        revenue-neutral at 24.382 mills, below the prior 25 mills and part of
        a long city pattern at or below 25 mills.
      sourceIds:
        - s-hayspost-budget-2026
    actions:
      - id: a-city-budget-2026
        date: "2025-09-12"
        body: |
          Served on the Hays City Commission body that approved the 2026 city
          budget at $54.3 million and 24.382 mills. Available coverage does
          not quote Ruder individually or report a dissent from him; Deputy
          City Manager Collin Bielser certified the budget as revenue-neutral.
        sourceIds:
          - s-hayspost-budget-2026
      - id: a-essential-air-service-warning-2025
        date: "2025-05-24"
        body: |
          Warned that replacing a proposed federal Essential Air Service
          subsidy cut for Hays Regional Airport with local funding could
          require a major increase in the city mill levy. This is included as
          a public tradeoff statement, not as a completed tax vote.
        sourceIds:
          - s-hayspost-eas
      - id: a-north-vine-roundabout-2022
        date: "2022-08-10"
        body: |
          Publicly supported the North Vine roundabout corridor project,
          calling it an elegant solution to a complex problem and tying it to
          safety, traffic flow, pedestrian access, and redevelopment potential.
        sourceIds:
          - s-hayspost-north-vine
    socialSignals: []
    gap:
      summary: |
        Earlier project notes and the sleuth pass misattributed an Ellis County
        1.96-mill levy increase to Ruder's city record. The corrected evidence
        shows a different picture: the Hays city budget action tied to Ruder's
        commission role was revenue-neutral and below the prior 25-mill rate.
      evidenceIds:
        - a-city-budget-2026

  - id: i-public-health-mandates
    title: "COVID-era public health mandates"
    stated:
      text: |
        In the 2020 Hays mask-ordinance debate, Ruder's stated position was
        not that masks were useless; he said he would wear a mask as his doctor
        recommended. His objection was to the city mandate itself, saying the
        decision should not be a mandate and that risk mitigation should be up
        to organizations.
      sourceIds:
        - s-hayspost-mask-original
    actions:
      - id: a-mask-original-no-2020-07-23
        date: "2020-07-23"
        body: |
          Cast the lone no vote when the Hays City Commission approved
          Ordinance 3988, the city's original mask ordinance. The city press
          release anchors the ordinance and date; Hays Post reports the 4-1
          roll-call split and Ruder's quoted mandate objection.
        sourceIds:
          - s-haysusa-civic-alert-mask
          - s-hayspost-mask-original
      - id: a-mask-extension-no-2020-08-27
        date: "2020-08-27"
        body: |
          Voted no when the commission extended the mask ordinance through
          October 5, 2020. The reported vote was 3-2, with Ruder and Michael
          Berges voting no.
        sourceIds:
          - s-hayspost-mask-aug
      - id: a-mask-extension-no-2020-10-02
        date: "2020-10-02"
        body: |
          Was the sole no vote at the October 2, 2020 special meeting where the
          commission extended the ordinance until specified COVID metrics or a
