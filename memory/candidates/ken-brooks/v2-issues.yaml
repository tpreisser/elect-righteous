  - id: i-board-process
    title: Public comment process and board–administration relations
    stated:
      text: |
        Brooks has consistently described the board's role as oversight, with
        day-to-day operations handled by the superintendent, administrators,
        and teachers. In his 2025 candidate Q&A he said, "I don't think that
        we need to micromanage our school district," and "There's only one
        employee in the district who answers to the board, and that's our
        superintendent." On a 2025 motion to table the Hays High student
        handbook for further board review, he said on the record, "We're not
        micromanaging that whole team there. They've done a terrific job and
        there's no reason why we should put this on hold."
      sourceIds:
        - s-hayspost-brooks-qa-2025
        - s-tigermedia-handbook-2025
    actions:
      - id: a-budget-hearing-reply-2024-09-09
        date: "2024-09-09"
        body: |
          At the September 9, 2024 FY25 budget hearing, after taxpayers John
          Pyle and Kent Kennedy raised budget concerns and fellow member
          Allen Park said, "Budget is our lane. We don't spend enough time
          with it," Brooks's on-record reply was, "The board works and votes
          on items in the budget throughout the year."
        sourceIds:
          - s-usd489-boarddocs
          - s-hayspost-budget-2024
      - id: a-handbook-discussion-2025-07-14
        date: "2025-07-14"
        body: |
          At the July 14, 2025 board meeting, the motion on the Hays High
          handbook failed 4-3. Brooks argued against tabling the handbook for
          further board review, saying on the record, "We're not micromanaging
          that whole team there. They've done a terrific job and there's no
          reason why we should put this on hold."
        sourceIds:
          - s-usd489-boarddocs
          - s-tigermedia-handbook-2025
      - id: a-bathrooms-discussion-2026-04-21
        date: "2026-04-21"
        body: |
          At the April 21, 2026 board meeting, during a discussion of Hays
          High single-stall bathroom design and vandalism reports raised by
          Park, Brooks said on the record, "We've had this discussion many
          times in the past, and you keep saying the same things, over and
          over and over, and they have been answered for you." He also said,
          "The administrators just felt all of them attacked. We don't
          micromanage. That's not our job here on the board, so they
          shouldn't feel like it's us versus them," and "If you want the
          information, ask it, but let's end this, because there is nothing
          more to discuss right now." Tiger Media Network separately
          recorded Brooks saying, "You make up data. Go ahead and give it
          to us if you have data." No formal motion was taken on the item.
        sourceIds:
          - s-usd489-boarddocs
          - s-usd489-highbond
          - s-hayspost-bathrooms-2026
          - s-tigermedia-bathrooms-2026
    socialSignals: []


