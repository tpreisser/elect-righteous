issues:

  # ===========================================================================
  - id: i-supt-nepotism
    title: Superintendent hiring and the nepotism policy
    stated:
      text: |
        Brooks has said the board's job is oversight, not day-to-day management of
        the district. In his 2025 candidate Q&A he said, "I don't think that we
        need to micromanage our school district," and "There's only one employee
        in the district who answers to the board, and that's our superintendent."
        Asked whether he disagreed with the district administration on any
        issue, he answered, "I can't think of anything." On the underlying
        nepotism debate that began in 2023 over the hire of the superintendent's
        wife as a teacher, Brooks framed the matter as a policy-text question
        rather than a personnel one, saying at the April 2023 meeting, "This is
        the same discussion we had last month that got out of hand. You should
        have asked for something to be put on the agenda."
      sourceIds:
        - s-hayspost-brooks-qa-2025
        - s-hayspost-nepotism-debate-2023
        - s-tigermedia-nepotism-2023
    actions:
      - id: a-personnel-transactions-2023
        date: "2023-04-24"
        body: |
          Voted yes on the personnel transactions consent item that had been
          pulled from the prior month's consent agenda for separate discussion.
          The motion passed 4-2. Vajnar and Park voted no; Hertel was absent.
          On the record Brooks said the discussion should have been raised
          through a formal agenda request rather than re-opened at the meeting.
        sourceIds:
          - s-usd489-boarddocs
          - s-hayspost-nepotism-debate-2023
          - s-tigermedia-nepotism-2023
      - id: a-admin-contracts-2024
        date: "2024-01-22"
        body: |
          Voted yes on one-year contract extensions for the district's
          administrators. The motion passed 5-1-1. Park voted no; Yarmer
          abstained. Brooks said on the record that the board was telling the
          administrators it would look at their contracts in the future and was
          recommending extension because the board wanted to keep the staff in
          place.
        sourceIds:
          - s-usd489-boarddocs
          - s-hayspost-admin-contracts-2024
      - id: a-admin-contracts-2026-03-10
        date: "2026-03-10"
        body: |
          Made the motion to extend the district administrators' contracts
          through the 2027-2028 school year. The motion passed 5-2. He then
          made the motion to extend the district directors' contracts through
          the same school year, which passed 7-0. On the record he said the
          administrators had "brought everything that you asked for for us to
          be able to vote" and that "we have an incredible administrative staff,
          there's no reason why we wouldn't approve every single one of them."
        sourceIds:
          - s-usd489-boarddocs
          - s-tigermedia-admin-contracts-2026
          - s-citizenjournal-board-takeaways
      - id: a-non-renew-hibbs-2026-03-10
        date: "2026-03-10"
        body: |
          At the same March 10, 2026 meeting, voted yes on the motion to
          indicate intent to non-renew teacher Silas Hibbs's contract for the
          2026-2027 school year. The motion passed 5-2 after two executive
          sessions.
        sourceIds:
          - s-usd489-boarddocs
          - s-tigermedia-admin-contracts-2026
    socialSignals: []

  # ===========================================================================
  - id: i-budget-facilities
    title: USD 489 budget, bond projects, and facilities
    stated:
      text: |
        In his October 2025 candidate Q&A, Brooks said, "I do feel they manage
        their budget adequately," referring to Superintendent Ron Wilson and
        Assistant Superintendent Chris Hipp. He said he supports the remaining
        bond projects, supports the district's five-year capital outlay plan
        as a useful planning tool, and wants to continue lowering enrollment
        fees. He also said he approved extra sewage line funding for
        O'Loughlin Elementary. In 2021 he said he did not have "an agenda so
        much" but wanted to see the bond passed.
      sourceIds:
        - s-hayspost-brooks-qa-2025
        - s-hayspost-brooks-qa-2021
    actions:
      - id: a-fy25-budget-2024-09-09
        date: "2024-09-09"
        body: |
          Voted yes on the FY25 USD 489 budget approval and on the motion to
          exceed the revenue-neutral rate at the budget hearing where taxpayers
          John Pyle and Kent Kennedy raised concerns. Roll-call totals were
          not enumerated by name in available reporting; Brooks's yes is
          unambiguous from the board majority and the absence of any reported
          dissent from him.
        sourceIds:
          - s-usd489-boarddocs
          - s-hayspost-budget-2024
      - id: a-bond-pm-motion-2025-03-24
        date: "2025-03-24"
        body: |
          Voted no on Yarmer's motion to look into hiring an outside project
          manager for the remainder of the bond program, including interviewing
          a prospective manager. The motion failed 3-4; Yarmer, Park, and
          Vajnar voted yes.
        sourceIds:
          - s-usd489-boarddocs
          - s-hayspost-bond-pm-2025
      - id: a-naming-rights-motion-2025-08-04
        date: "2025-08-04"
        body: |
          At the August 4, 2025 board retreat, moved to add discussion of
          Golden Belt Bank's $200,000, 10-year naming-rights offer for the new
          Hays High football field to an upcoming regular-meeting agenda. The
          motion failed 3-3 for lack of a fourth yes; Brooks, Ruder, and
          Zampieri-Lillpopp voted yes; Yarmer was absent. Brooks said the bank
          did not have "any ill intentions" and was "trying to help our
          community and help our school district," and noted that board policy
          allows three members to request a special meeting. Board President
          Vajnar later pulled the item from the September 8 agenda; the bank's
          offer expired September 15, 2025 without a board accept vote.
        sourceIds:
          - s-usd489-boarddocs
          - s-hayspost-naming-rights-1
          - s-hayspost-naming-rights-2
      - id: a-asbestos-hms-2025-09-22
        date: "2025-09-22"
        body: |
          Voted yes on the $69,480 contract with ACM Removal LLS to remove
          floor tile and abate non-friable asbestos-containing mastic in
          hallway areas of the new Hays Middle School building at 2300 13th
          Street. The motion passed 6-1; Park was the lone no vote. Brooks
          asked Park what he would have changed if he had received the
          change-order documentation in advance.
        sourceIds:
          - s-usd489-boarddocs
          - s-hayspost-asbestos-hms-preview
          - s-hayspost-asbestos-hms-vote
      - id: a-land-sale-2025-12-15
        date: "2025-12-15"
        body: |
          Voted yes on the sealed-bid sale of 7.23 acres of district-owned
          property at 201 W. 29th Street, north of the current Hays Middle
          School football field. The motion passed 5-1; Park voted no;
          Zampieri-Lillpopp was absent. An earlier motion by Park to table the
          sale had failed.
        sourceIds:
          - s-usd489-boarddocs
          - s-hayspost-land-sale-2025
      - id: a-asbestos-felten-2025-12-16
        date: "2025-12-16"
        body: |
          Voted yes on the $110,315 contract with Integrated Solutions to
          remove asbestos floor tile, adhesive, and window glazing at Felten
          Elementary. The motion passed 4-2; Park and Yarmer voted no.
        sourceIds:
          - s-usd489-boarddocs
          - s-hayspost-asbestos-felten-vote
      - id: a-felten-gmp-2026-02-24
        date: "2026-02-24"
        body: |
          Voted yes on the Felten Elementary bond project Guaranteed Maximum
          Price and called for the vote in his procedural role. The motion
          passed 4-2; Park and Yarmer voted no.
        sourceIds:
          - s-usd489-boarddocs
          - s-tigermedia-felten-gmp-2026
