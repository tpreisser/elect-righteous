# Narrative-writer process notes (for orchestrator review)
# -----------------------------------------------------------------------------

narrative_writer_notes:
  symmetry_test_paragraphs_rewritten: 4
  rewrite_log:
    - "Issue 1 stated.text — first draft used 'Brooks defends the administration' framing; rewrote to direct quotation from candidate Q&A + April 2023 meeting record. A 'defends' verb imputes a posture; quoting his own words and citing the meeting record passes symmetry."
    - "Issue 1 a-admin-contracts-2026-03-10 — first draft used 'Brooks pushed the contracts through'; rewrote to 'Made the motion to extend ... The motion passed 5-2.' Both versions describe the same vote, but the second is the factual record without an evaluative verb."
    - "Issue 3 a-bathrooms-discussion-2026-04-21 — first draft framed Brooks's 'let's end this' line as 'shutting down debate.' Rewrote to direct quotation of the four on-record statements plus 'No formal motion was taken on the item.' If a Democrat said the same words at the same meeting, the body should read identically — the rewrite ensures it does."
    - "Issue 3 stated.text — first draft used 'consistently invoked anti-micromanagement to limit board oversight.' Rewrote to plain quoting of his stated position plus the handbook-vote quote. The 'to limit board oversight' clause is an inferred motive; quoting him allows the reader to assess the pattern across actions without the narrative imputing intent."
  gap_decision:
    - issue: i-supt-nepotism
      gap_included: false
      reason: |
        Stated position and documented actions align. Brooks has said the
        board's role is oversight not management, that only the superintendent
        answers to the board, and that he could not think of any issue on
        which he disagrees with the administration. His votes on personnel
        transactions (2023), administrator contracts (2024), and administrator
        and director contracts (2026) are consistent with that stated posture.
        No triangulated divergence exists. Per IDENTITY.md, the gap is omitted
        rather than fabricated for symmetry.
    - issue: i-budget-facilities
      gap_included: false
      reason: |
        Stated position is support for the current administration's budget
        management, the remaining bond projects, the five-year capital outlay
        plan, and lowering enrollment fees. Documented actions are consistent
        with that stated posture: yes on the FY25 budget, yes on multiple
        bond-execution motions (HMS asbestos, Felten asbestos, Felten GMP,
        land sale), and a procedural attempt to bring outside naming-rights
        money in to supplement bond-financed facilities. The no vote on the
        outside project manager is consistent with Brooks's broader 'oversight
        not management' framing rather than a contradiction of his stated
        budget-support position. No triangulated divergence.
    - issue: i-board-process
      gap_included: false
      reason: |
        Stated position is that the board's role is oversight, not
        micromanagement, and that day-to-day work is the administrators' and
        teachers' responsibility. Documented actions — brief replies to
        public budget comment, opposition to tabling the high-school
        handbook for further board review, and a direct exchange in April
        2026 telling a fellow member to 'end this, because there is nothing
        more to discuss right now' — are consistent expressions of the same
        posture. A reader may agree or disagree with that posture as a
        governance philosophy, but the actions match the stated frame; there
        is no stated-vs-behavior divergence to anchor a gap. Per the symmetry
        test, the same set of actions taken by a candidate of the opposite
        party with the same stated frame should read identically as
        'consistent posture, no triangulated gap.' Gap omitted.
  faith_signals_handled:
    - "Brooks's 19-year children's ministry leadership at Celebration Community Church (Hays campus), his Kiwanis International membership, and his Thanksgiving Community Food Drive coordination since 2008 are placed in candidate_metadata.church and candidate_metadata.communityService. They are NOT used as evidence in or against any of the three IssueCards. Per IDENTITY.md commitment, faith affiliation does not infer policy and is not wired into governance evidence."
    - "The Celebration Community Church Facebook presence (facebook.com/c3hays) was identified in the sleuth-pass but is intentionally NOT registered as a Source on any IssueCard — affiliation only, not governance evidence."
  caucus_on_brooks_anti_micromanagement_framing:
    - "Sleuth-pass flagged that Brooks's 'anti-micromanagement' frame is a governance posture, not a policy belief, and that the symmetry test should be applied rigorously. Handled as follows: (1) in Issue 3 stated.text, Brooks's anti-micromanagement framing is direct-quoted from his 2025 candidate Q&A and the July 2025 handbook meeting — his own words, not editorial paraphrase; (2) in Issue 3 actions, each documented exchange is described factually with the verbatim Brooks quotes captured in reporting, and 'No formal motion was taken' is noted where applicable; (3) no inferred motive verbs ('shut down,' 'silenced,' 'suppressed') were used in any body text — symmetry rewrites removed three such instances from drafts; (4) no gap was asserted because Brooks's stated frame and his documented actions are consistent expressions of the same posture. Readers can assess whether the posture is the right one without the narrative pre-coding their conclusion."
  rejected_data_points:
    - "April 22, 2024 mascot change vote (5-2; Brooks NO with Zampieri-Lillpopp): captured in raw-dump-v2.md as Source K. NOT mapped to any of the three IssueCards in this draft because (a) the underlying issue is cultural-name policy / curriculum, which is a separate fourth issue that the sleuth-pass listed as a candidate-for-elevation by the narrative-writer but with thin evidence (one vote, paraphrased rationale, no Brooks verbatim quote); (b) the reporter-paraphrased rationale ('delay for community input, not against the mascot per se') is not strong enough to anchor a stated.text without imputing belief. Per the halt-condition rule, an issue with fewer than 2 ActionEvidence entries should not be padded into existence. Omitted, not stretched."
    - "April 24, 2023 verbatim Brooks quote referenced in sleuth-pass ('He should have asked to have something put on the agenda. This didn't need to be taken out.') vs. raw-dump-v2.md verbatim ('You should have asked for something to be put on the agenda.'): two reporters captured slightly different verb / pronoun. Used the raw-dump-v2.md primary-source-anchored version in stated.text per Hays Post canonical."


