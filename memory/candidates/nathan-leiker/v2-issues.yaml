issues:
  - id: i-subdivision-rural-land-use
    title: "Subdivision growth, rural land use, and infrastructure capacity"
    stated:
      text: |
        Leiker's 2022 candidate Q&A presented a limited-government view of
        local land use. He said government should have "very little
        authority" over what people do on private property apart from illegal
        actions, while also saying the county should recruit business by
        keeping taxes stable and showing it can maintain infrastructure. After
        the 2022 canvass, he said he wanted more focus on roads, bridges, and
        the infrastructure needed to grow Ellis County.
      sourceIds:
        - s-hayspost-leiker-qa-2022
        - s-hayspost-2022-canvass
    actions:
      - id: a-fairview-no-2025
        date: "2025-07-01"
        body: |
          Cast the lone no vote on the Fairview Patch final plat. The motion
          passed 2-1, with Berges and Younger voting yes. Hays Post coverage
          of the same issue records Leiker saying the location worked against
          the comprehensive plan and that the proposal was "getting far from
          localized subdivision patterns."
        sourceIds:
          - s-minutes-07012025
          - s-hayspost-fairview-may2025
          - s-hayspost-fairview-jul2025
      - id: a-big-creek-rhid-start-2025
        date: "2025-06-03"
        body: |
          Voted yes to approve Resolution 2025-08, starting the RHID process
          for Big Creek Estates. The motion passed 3-0. During the discussion,
          Leiker asked about specials versus a RHID and said he had no problem
          signing the resolution to start the process but would do additional
          homework before it returned to the commission.
        sourceIds:
          - s-minutes-06032025
          - s-hayspost-rhid-june2025
      - id: a-big-creek-rhid-final-2025
        date: "2025-09-16"
        body: |
          Made the motion to approve Resolution 2025-16 establishing the Big
          Creek Estates 3rd Addition RHID, adopting the development plan, and
          approving the development agreement. The motion passed 3-0 after a
          public hearing where township opposition and resident concerns about
          water, sewer rates, and roads were recorded in the minutes.
        sourceIds:
          - s-minutes-09162025
      - id: a-big-creek-plat-condition-2026
        date: "2026-02-10"
        body: |
          Seconded the motion approving the Big Creek Estates preliminary plat
          with a condition that the developer obtain written approval from the
          Big Creek Improvement District to tie into its sewer system. The
          condition came from Leiker's discussion-stage request and the motion
          passed 3-0.
        sourceIds:
          - s-minutes-02102026
      - id: a-subdivision-road-standards-2025
        date: "2025-08-19"
        body: |
          Participated in the county's subdivision road standards discussion,
          raising questions about right-of-way, minimum road standards, and
          how standards would translate into public-facing documents. The
          same road-infrastructure thread later shaped CID and subdivision
          maintenance discussions in early 2026.
        sourceIds:
          - s-minutes-08192025
          - s-minutes-02102026
    socialSignals: []
    gap:
      summary: |
        Leiker's 2022 private-property language was more limited-government
        than his 2025-2026 commission record on subdivisions. In office, he
        used comprehensive-plan, infrastructure, RHID, and sewer-condition
        tools to oppose, condition, or structure development rather than
        treating private-property use as outside county authority.
      evidenceIds:
        - a-fairview-no-2025
        - a-big-creek-rhid-final-2025
        - a-big-creek-plat-condition-2026

  - id: i-budget-taxes-services
    title: "County budget, taxes, employee retention, and capital projects"
    stated:
      text: |
        In his 2022 candidate Q&A, Leiker said the county should leave the
        sales tax alone and use those funds for infrastructure, saying Ellis
        County was "too far behind" to use them in another manner. In 2025
        budget discussions, he framed county government as a service industry
        and said the county should be respectful in its use of tax dollars.
        He also said a proposed mill increase could create a "soft landing"
        if state or federal grants were pulled.
      sourceIds:
        - s-hayspost-leiker-qa-2022
        - s-minutes-07082025
        - s-hayspost-budget-soft-landing
    actions:
      - id: a-2026-budget-rnr-2025
        date: "2025-09-09"
        body: |
          Made the motions to open and close the 2026 Revenue Neutral Rate
          and budget hearing, then made the motion to approve the 2026 General
          Fund and Fire District budgets exceeding the revenue-neutral rates.
          The final budget vote passed 3-0 by named roll call: Berges yes,
          Younger yes, Leiker yes. Leiker said commissioners had spent more
          than 13 hours going line by line through the budget.
        sourceIds:
          - s-minutes-09092025
          - s-hayspost-salary-2026
      - id: a-cola-retention-2025
        date: "2025-06-10"
        body: |
          Made the motion to approve budget adjustments, pay scale updates,
          and Resolution 2025-11 implementing a 2.5 percent COLA for county
          employees, contract positions, and elected officials. The motion
          passed 2-1, with Berges dissenting. Leiker said he understood the
          concerns, but that it was easier to retain good employees than to
          replace them because replacement costs more.
        sourceIds:
          - s-minutes-06102025
      - id: a-budget-proposals-2025
        date: "2025-08-05"
        body: |
          During the 2026 budget review, proposed full funding for DSNWK and
          High Plains Mental Health, full funding of the HPMH CIC from sales
          tax, reevaluation of the scholarship program, contingency rather
          than line-item treatment for Ameritowne, support for fully funding
          the Conservation District's original request, and avoiding value
          engineering on capital projects.
        sourceIds:
          - s-minutes-08052025
      - id: a-pbc-bonds-2026
        date: "2026-02-03"
        body: |
          Made the motion approving Resolution 2026-05 authorizing the sale
          of building project bonds through the Ellis County Public Building
          Commission, with up to $11 million authorized for the Law
          Enforcement Center remodel, EMS Building, Courthouse HVAC,
          Administrative Building HVAC, and Fire Services Storage Building.
          The motion passed 3-0.
        sourceIds:
          - s-minutes-02032026
    socialSignals: []

  - id: i-mental-health-jail-costs
    title: "Mental health funding and jail-cost avoidance"
    stated:
      text: |
        Leiker's clearest public mental-health position appears in the 2026
        county budget process. Hays Post coverage framed the mental-health
        increase as "less expensive than building a new jail," while the
        official minutes show Leiker proposing full funding for High Plains
        Mental Health and the Crisis Intervention Center, with the CIC funded
        from sales tax.
      sourceIds:
        - s-hayspost-budget-2026
        - s-minutes-08052025
    actions:
      - id: a-hpmh-cic-budget-2025
        date: "2025-08-05"
        body: |
          During the 2026 budget review, proposed fully funding High Plains
          Mental Health and fully funding the High Plains Mental Health Crisis
          Intervention Center from sales tax. The official minutes record the
          specific funding preference, while the related Hays Post budget
          coverage supplies the jail-cost comparison.
        sourceIds:
          - s-minutes-08052025
          - s-hayspost-budget-2026
      - id: a-hpmh-alternate-2026
        date: "2026-01-13"
        body: |
          Accepted appointment as the commission's alternate representative
          to the High Plains Mental Health Board for 2026. The same minutes
          identify Bill Ring as the primary voting member, correcting any
          shorthand that treats Leiker as the primary board representative.
        sourceIds:
          - s-minutes-01132026
      - id: a-budget-rollcall-mental-health-2025
        date: "2025-09-09"
        body: |
          Voted yes by named roll call on the 2026 county budget after the
          August budget-review process that included his HPMH and CIC funding
          proposals. The budget exceeded the revenue-neutral rate and passed
          3-0.
        sourceIds:
          - s-minutes-09092025
          - s-minutes-08052025
    socialSignals: []

  - id: i-process-expertise-procurement
    title: "Process discipline, outside expertise, and procurement"
    stated:
      text: |
        Leiker's public governing style is process-heavy. In 2022 he warned
        that transparency could become "less transparent" and be abused. In
        the 2025 mill-levy discussion, he said county government is a service
        industry and that commissioners should be respectful in their use of
        tax dollars. In 2026, during the Tallgrass solar review, he said the
        commissioners were not experts and were seeking expertise to guide
        their decisions.
      sourceIds:
        - s-hayspost-leiker-qa-2022
        - s-minutes-07082025
        - s-minutes-01132026
        - s-hayspost-salary-2026
    actions:
      - id: a-solar-expertise-2026
        date: "2026-02-03"
        body: |
          Made the motion approving agreements with Tallgrass Development,
          Foulston Attorneys, and AcreStrong to assist with review,
          documentation, and negotiations for the Tallgrass solar project.
          The agreement required Tallgrass to reimburse the county up to
          $110,000 for legal and consulting services. Leiker said the motion
          was not accepting the project but protecting the county.
        sourceIds:
          - s-minutes-02032026
          - s-hayspost-solar-feb2026
      - id: a-bridge-homework-2025
        date: "2025-05-20"
        body: |
          During the 12th Street Bridge and O'Loughlin Elementary discussion,
          said the county needed to partner with the City of Hays because
          traffic patterns would change, and said commissioners needed to do
          more homework before deciding whether to close the bridge. The
          commission decided not to include 12th Street for closure on the
          Saline River bridge grant application.
        sourceIds:
          - s-minutes-05202025
      - id: a-verizon-procurement-2025
        date: "2025-07-01"
        body: |
          Made the motion to approve a two-year Verizon cell phone contract.
          The motion passed 3-0. The staff presentation framed the switch as
          net savings compared with Nex-Tech Wireless plus additional
          secondary savings.
        sourceIds:
          - s-minutes-07012025
      - id: a-road-grader-bidding-2025
        date: "2025-07-01"
        body: |
          Made the motion to purchase a 2025 Caterpillar road grader through
          Sourcewell government pricing, and during discussion asked when the
          next machine would be rebid. Leiker said he wanted the next fall
          purchase opened to competitive bidding.
        sourceIds:
          - s-minutes-07012025
      - id: a-public-works-restructure-2025
        date: "2025-07-01"
        body: |
          Made the motion approving the Public Works department restructure
          and attached job descriptions. The 3-0 vote created or revised job
          pathways including heavy equipment operator, mechanic, and noxious
          weed succession structures.
